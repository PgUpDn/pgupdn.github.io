<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Xinyu Yang</title>
    <meta http-equiv="refresh" content="6; url=https://pgupdn.github.io/" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="/" aria-label="Go to the home page">XY</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          Menu
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Main navigation">
          <a href="/#about">about</a>
          <a href="/blog/">blog</a>
          <a href="/#focus">focus</a>
          <a href="/#work">selected work</a>
          <a href="/#notes">notes</a>
          <a href="/#contact">contact</a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="section container contact-section">
        <div class="section-heading">
          <p class="section-kicker">404</p>
          <h1>That page is not here.</h1>
          <p>
            The link may be outdated, or the page may have moved. You will be
            redirected to the homepage in a few seconds.
          </p>
        </div>
        <div class="contact-panel">
          <a class="contact-link" href="https://pgupdn.github.io/">Go to homepage</a>
          <p class="contact-note">
            If you expected a project page here, it likely has not been published yet.
          </p>
        </div>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
